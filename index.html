<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>QAG: The Living Universe | Ripley.oneapp.dev</title>
    <meta name="description"
          content="Quantum Affinity Gravity: Where Physics meets the Soul. The Research Hub of Rodney A. Ripley Jr.">

    <!-- CSS and Global Assets -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Quicksand:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-top: #1e293b;
            --bg-bot: #0f172a;

            --glass: rgba(255, 255, 255, 0.08);
            --glass-strong: rgba(30, 41, 59, 0.85);

            --teal: #5eead4;
            --purple: #c084fc;
            --gold: #fcd34d;
            --red: #fca5a5;
            --blue: #93c5fd;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(to bottom, var(--bg-top), var(--bg-bot));
            background-attachment: fixed;
            color: #f8fafc;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            min-height: 100vh;
        }

        h1, h2, h3, h4, .title-font {
            font-family: 'Cinzel', serif;
        }

        .mono-font {
            font-family: 'JetBrains Mono', monospace;
        }

        .glass-panel {
            background: var(--glass-strong);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .glass-blackboard {
            background: rgba(15, 23, 42, 0.6);
            border-left: 2px solid var(--teal);
            padding: 1.5rem;
            border-radius: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .math-scroll {
            display: block;
            width: 100%;
            overflow-x: auto;
        }

        .data-label {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-bottom: 0.5rem;
        }

        .story-text {
            line-height: 1.8;
            font-size: 1.1rem;
            color: #e2e8f0;
        }

        .whimsical-intro {
            font-family: 'Cinzel', serif;
            font-style: italic;
            color: var(--teal);
            opacity: 0.9;
        }

        .academic-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; filter: blur(2px); }
            50% { opacity: 1; filter: blur(0px); }
        }

        .auth-btn {
            background: linear-gradient(135deg, rgba(45,212,191,0.2) 0%, rgba(192,132,252,0.2) 100%);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            color: white;
            font-weight: 700;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .auth-btn:hover {
            border-color: var(--teal);
            box-shadow: 0 0 20px rgba(94,234,212,0.3);
            transform: scale(1.05);
        }
    </style>

    <!-- External dependencies via CDN for global access -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
